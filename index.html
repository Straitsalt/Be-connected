<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be-connected | Matrix</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #05070F; color: #E2E8F0; display: flex; flex-direction: column; height: 100vh; }
        .hidden { display: none !important; }
        
        /* Auth Portal Views */
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background: #0B0E17; border: 1px solid #1F2937; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .auth-container h2 { color: #22D3EE; margin-top: 0; }
        .auth-container input { width: 100%; padding: 12px; margin: 10px 0; background: #030408; border: 1px solid #374151; color: white; border-radius: 8px; box-sizing: border-box; }
        
        /* Main Application Workspace Dashboard */
        .nav-bar { background: #0B0E17; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1F2937; }
        .logo { font-size: 16px; margin: 0; font-weight: bold; color: #22D3EE; }
        .main-layout { display: flex; flex-grow: 1; overflow: hidden; }
        
        /* Sidebar Finder Feed Column */
        .sidebar { width: 300px; background: #070A12; border-right: 1px solid #1F2937; display: flex; flex-direction: column; padding: 15px; gap: 15px; }
        .search-box { width: 100%; padding: 10px; background: #030408; border: 1px solid #374151; color: white; border-radius: 6px; box-sizing: border-box; }
        .friends-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        /* Friend Target Trigger Blocks */
        .friend-card { background: #111625; border: 1px solid #1F2937; padding: 12px; border-radius: 8px; cursor: pointer; margin: 0; transition: all 0.2s; }
        .friend-card:hover { border-color: #22D3EE; background: #161D30; }
        .friend-card h3 { margin: 0; font-size: 15px; color: #E2E8F0; display: flex; align-items: center; justify-content: space-between; }
        .friend-card h3::after { content: '➡️'; font-size: 11px; opacity: 0.6; }
        
        /* Active Chat Workspace Display */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #05070F; }
        .chat-header { background: #0B0E17; padding: 12px 20px; border-bottom: 1px solid #1F2937; color: #A855F7; font-weight: bold; }
        .chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Base Chat Elements Rules */
        .msg-bubble { background: #111625; border: 1px solid #1F2937; padding: 12px; border-radius: 12px; max-width: 70%; align-self: flex-start; }
        .msg-bubble.own { background: #1E1B4B; border-color: #4338CA; align-self: flex-end; }
        .msg-user { font-size: 11px; color: #A855F7; font-weight: bold; margin-bottom: 4px; }
        .msg-time { font-size: 9px; color: #64748B; margin-top: 6px; text-align: right; }
        .msg-bubble.disappearing { border-color: #F43F5E; box-shadow: 0 0 8px rgba(244, 63, 94, 0.15); }
        .ghost-badge { font-size: 9px; color: #F43F5E; font-weight: bold; margin-bottom: 4px; display: block; }
        .msg-media { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 5px; }
        audio { margin-top: 5px; display: block; width: 240px; height: 35px; }
        
        .input-panel { background: #0B0E17; padding: 15px; border-top: 1px solid #1F2937; display: flex; flex-direction: column; gap: 10px; }
        .controls-row { display: flex; gap: 10px; align-items: center; }
        .input-panel input[type="text"] { flex-grow: 1; background: #030408; border: 1px solid #374151; padding: 12px; border-radius: 8px; color: white; outline: none; }
        
        .btn { border: none; padding: 10px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; color: white; display: inline-flex; align-items: center; gap: 6px; }
        .btn-cyan { background: #0891B2; }
        .btn-ghost { background: #1F2937; color: #94A3B8; }
        .btn-ghost.active { background: #E11D48; color: white; }
        .btn-danger { background: #E11D48; }
        .btn-audio.recording { background: #EF4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .hidden-loader { display: none; }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-container">
        <h2 id="authTitle">⚡ Be-connected</h2>
        <input type="text" id="authHandle" placeholder="Choose Unique Handle Name">
        <input type="password" id="authSecret" placeholder="Set Secure Password Key">
        <button class="btn btn-cyan" style="width: 100%; justify-content: center; margin-top: 10px;" id="authBtn" onclick="executeAuthAction()">Enter System Matrix</button>
        <p style="text-align: center; font-size: 12px; color: #64748B; margin-top: 15px; cursor: pointer;" onclick="toggleAuthMode()" id="authToggleMsg">Need a new account? Register here</p>
    </div>

    <div id="appWorkspace" class="hidden" style="display: flex; flex-direction: column; height: 100vh;">
        <div class="nav-bar">
            <h2 class="logo">⚡ BE-CONNECTED</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span id="activeUserDisplay" style="color: #34D399; font-weight: bold; font-size: 13px;"></span>
                <button class="btn btn-ghost" onclick="triggerPasswordModification()" style="font-size: 11px; padding: 6px 10px;">🔑 Change Pass</button>
                <button class="btn btn-ghost" id="ghostToggle" onclick="toggleGhostMode()">👻 Disappearing Off</button>
                <button class="btn btn-ghost" onclick="executeLogOut()" style="font-size: 11px; padding: 6px 10px;">🔓 Log Out</button>
                <button class="btn btn-danger" onclick="triggerAdminPurge()" style="font-size: 11px; padding: 6px 10px;">🗑️ Clear Chat</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="sidebar">
                <input type="text" id="friendSearchInput" class="search-box" placeholder="🔎 Search friends by handle name..." oninput="filterFriendsNetwork()">
                <div class="friends-list" id="friendsFeedColumn">
                    </div>
            </div>

            <div class="chat-area">
                <div class="chat-header" id="currentChatHeadingHeader">👈 Select a transmission target to open communication array</div>
                <div class="chat-container" id="chatStreamBox"></div>
                
                <div class="input-panel hidden" id="chatActionDashboard">
                    <div class="controls-row">
                        <input type="text" id="messageInput" placeholder="Broadcast secure network stream packet data...">
                        <button class="btn btn-cyan" onclick="sendTextMessage()">Send ➡️</button>
                    </div>
                    <div class="controls-row" style="justify-content: flex-start;">
                        <label class="btn btn-ghost">🖼️ Attach Media <input type="file" id="mediaAssetFile" class="hidden-loader" onchange="uploadMediaAsset(event)"></label>
                        <button class="btn btn-ghost" id="audioRecordBtn" onclick="toggleVoiceCapture()">🎙️ Record Voice</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
